<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Étique Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Lato',sans-serif;background:#FAFAFA;color:#4a4a4a}h1,h2{font-family:'Playfair Display',serif;font-weight:400;color:#222}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#222}.lb{background:white;padding:50px;max-width:400px;width:100%;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.1)}.lb h2{margin-bottom:30px;letter-spacing:2px}.lb input{width:100%;padding:15px;border:1px solid #e0e0e0;margin-bottom:15px;font-size:1rem;font-family:'Lato',sans-serif}.lb button{width:100%;padding:15px;background:#B76E79;color:white;border:none;cursor:pointer;font-size:0.9rem;font-family:'Lato',sans-serif;text-transform:uppercase;letter-spacing:2px;transition:0.3s}.lb button:hover{background:#222}
.dash{display:none}.dh{background:#white;color:#222;padding:25px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-bottom:1px solid #eee}.dh h1{font-size:1.6rem;letter-spacing:2px}.dh button,.dh a{padding:10px 24px;border:1px solid #222;cursor:pointer;font-size:0.8rem;color:#222;background:transparent;text-decoration:none;font-family:'Lato',sans-serif;text-transform:uppercase;letter-spacing:1px;transition:0.3s}.dh button:hover,.dh a:hover{background:#222;color:white}.be{background:#B76E79!important;color:white!important;border-color:#B76E79!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding:40px}.sc{background:white;padding:30px;box-shadow:0 5px 20px rgba(0,0,0,0.03);text-align:center;border-top:3px solid #B76E79}.sl{font-size:0.8rem;color:#7a7a7a;text-transform:uppercase;letter-spacing:1px}.sv{font-size:3rem;font-family:'Playfair Display',serif;margin-top:10px;color:#222}
.tw{padding:0 40px 40px;overflow-x:auto}table{width:100%;border-collapse:collapse;background:white;box-shadow:0 5px 20px rgba(0,0,0,0.03)}th{background:#f9f9f9;color:#222;padding:20px;text-align:left;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #eee}td{padding:18px 20px;border-bottom:1px solid #f9f9f9;font-size:0.95rem;color:#4a4a4a}
select.st{padding:8px 12px;border:1px solid #e0e0e0;font-family:'Lato',sans-serif;background:#FAFAFA;color:#222;outline:none}.del{background:none;border:none;color:#B76E79;cursor:pointer;font-size:1rem;text-transform:uppercase;letter-spacing:1px;font-size:0.8rem}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>ÉTique Admin</h2><input type="text" id="u" value="admin"><input type="password" id="p" placeholder="Password"><button onclick="login()">Enter Concierge</button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>Concierge Dashboard</h1><div><button class="be" onclick="exp()">Export</button> <a href="index.html">View Salon</a> <button onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Requests</div><div class="sv" id="st">0</div></div><div class="sc"><div class="sl">Pending Review</div><div class="sv" id="sn" style="color:#B76E79">0</div></div><div class="sc"><div class="sl">Confirmed</div><div class="sv" id="sd">0</div></div></div>
<div class="tw"><table><thead><tr><th>Received</th><th>Client</th><th>Phone</th><th>Category</th><th>Treatment</th><th>Pref Date</th><th>Time</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div>
<script>
const K='etique_bookings';if(sessionStorage.getItem('etique_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('etique_admin','true');showD()}else alert('Invalid credentials')}
function logout(){sessionStorage.removeItem('etique_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='Pending Review').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Confirmed').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td><strong>${i.name||'—'}</strong></td><td>${i.phone||'—'}</td><td>${i.service||'—'}</td><td>${i.treatment||'—'}</td><td>${i.date||'—'}</td><td>${i.time||'—'}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['Pending Review','Contacted','Confirmed','Completed'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">Cancel</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Cancel this appointment request?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Date','Name','Phone','Category','Treatment','Pref Date','Time','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.name,i.phone,i.service,i.treatment,i.date,i.time,i.status]);const c=[h,...r].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='etique_appointments.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
